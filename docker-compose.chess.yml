# Overlay opt-in: thêm engine phân tích cờ vua (Arasan, MIT) vào WeKnora.
#
# Cách dùng:
#   docker compose -f docker-compose.yml -f docker-compose.chess.yml up -d
#
# Overlay này:
#   - Thêm service chess-engine (sidecar HTTP bọc Arasan qua UCI).
#   - Cấu hình app gọi engine ở chế độ http qua biến WEKNORA_CHESS_*.
#
# Không sửa docker-compose.yml gốc nên các triển khai hiện có không bị ảnh hưởng.

services:
  chess-engine:
    image: weknora-chess-engine:local
    build:
      context: .
      dockerfile: docker/Dockerfile.chess-engine
      # Đổi ARASAN_BUILD thành "avx2" nếu CPU hỗ trợ để engine mạnh/nhanh hơn.
      args:
        ARASAN_VERSION: v25.4
        ARASAN_BUILD: modern
    container_name: WeKnora-chess-engine
    networks:
      - WeKnora-network
    restart: unless-stopped
    # Probe cầu HTTP /health (uci_http_bridge.py) để app biết engine đã sẵn sàng.
    # start_period cho Arasan kịp khởi tạo UCI (uci/isready) trước khi tính fail.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  app:
    # Dùng định dạng list cho khớp environment ở docker-compose.yml (tránh lỗi merge).
    environment:
      - WEKNORA_CHESS_ENABLED=true
      - WEKNORA_CHESS_MODE=http
      - WEKNORA_CHESS_ENGINE_ENDPOINT=http://chess-engine:8080
      - WEKNORA_CHESS_DEFAULT_DEPTH=14
      - WEKNORA_CHESS_TIMEOUT_SEC=15
    # Mount file builtin_agents.yaml từ host để chỉnh agent (vd HLV Cờ vua) mà
    # không phải rebuild image. (config.yaml đã được mount sẵn ở compose gốc.)
    volumes:
      - ./config/builtin_agents.yaml:/app/config/builtin_agents.yaml
    depends_on:
      chess-engine:
        condition: service_healthy
