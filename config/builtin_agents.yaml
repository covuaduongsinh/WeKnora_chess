# Built-in Agent Configuration with i18n support
# Each agent has localized name, description, avatar, and config overrides per language.
# The "default" locale is used as fallback when the user's language is not found.

builtin_agents:
  - id: "builtin-quick-answer"
    avatar: ""
    is_builtin: true
    i18n:
      default:
        name: "Quick Answer"
        description: "Knowledge base RAG Q&A for fast and accurate answers"
      vi-VN:
        name: "Hỏi đáp nhanh"
        description: "Hỏi đáp RAG dựa trên kho tri thức, trả lời nhanh và chính xác"
      ja-JP:
        name: "クイック回答"
        description: "ナレッジベース RAG Q&A による迅速で正確な回答"
      ko-KR:
        name: "빠른 답변"
        description: "지식 베이스 RAG Q&A를 통한 빠르고 정확한 답변"
    config:
      agent_mode: "quick-answer"
      system_prompt_id: "default_kb"
      context_template_id: "default_context"
      temperature: 0.7
      max_completion_tokens: 2048
      web_search_enabled: true
      web_search_max_results: 5
      multi_turn_enabled: true
      history_turns: 5
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3
      enable_query_expansion: true
      enable_rewrite: true
      fallback_strategy: "model"

  - id: "builtin-smart-reasoning"
    avatar: ""
    is_builtin: true
    i18n:
      default:
        name: "Smart Reasoning"
        description: "ReAct reasoning framework with multi-step thinking and tool calling"
      vi-VN:
        name: "Suy luận thông minh"
        description: "Khung suy luận ReAct, hỗ trợ suy nghĩ nhiều bước và gọi công cụ"
      ja-JP:
        name: "スマート推論"
        description: "ReAct 推論フレームワーク、マルチステップ思考とツール呼び出し対応"
      ko-KR:
        name: "스마트 추론"
        description: "ReAct 추론 프레임워크, 다단계 사고 및 도구 호출 지원"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "rag-qa"
      system_prompt: ""
      temperature: 0.7
      max_completion_tokens: 2048
      max_iterations: 50
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "query_knowledge_graph"
        - "get_document_info"
      web_search_enabled: true
      web_search_max_results: 5
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 5
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-data-analyst"
    avatar: "📊"
    is_builtin: true
    i18n:
      default:
        name: "Data Analyst"
        description: "Professional data analysis agent with SQL query and statistical analysis for CSV/Excel files"
      vi-VN:
        name: "Chuyên gia phân tích dữ liệu"
        description: "Trợ lý AI phân tích dữ liệu chuyên nghiệp, hỗ trợ truy vấn SQL và phân tích thống kê trên tệp CSV/Excel"
      ja-JP:
        name: "データアナリスト"
        description: "CSV/Excel ファイルの SQL クエリと統計分析に対応するプロフェッショナルなデータ分析エージェント"
      ko-KR:
        name: "데이터 분석가"
        description: "CSV/Excel 파일에 대한 SQL 쿼리 및 통계 분석을 지원하는 전문 데이터 분석 에이전트"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "data-analysis"
      system_prompt_id: "data_analyst"
      temperature: 0.3
      max_completion_tokens: 4096
      max_iterations: 30
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      supported_file_types:
        - "csv"
        - "xlsx"
      allowed_tools:
        - "data_schema"
        - "data_analysis"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: true
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 5
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 5
      rerank_threshold: 0.3

  - id: "builtin-wiki-researcher"
    avatar: "📚"
    is_builtin: true
    i18n:
      default:
        name: "Wiki Questioner"
        description: "Specialized agent for answering questions based on Wiki knowledge bases"
      vi-VN:
        name: "Hỏi đáp Wiki"
        description: "Trợ lý AI chuyên trả lời câu hỏi dựa trên kho tri thức Wiki"
      ja-JP:
        name: "Wiki 問答"
        description: "Wikiナレッジベースでの回答問題に特化したエージェント"
      ko-KR:
        name: "위키 질문"
        description: "위키 지식 베이스에서 답변하는 데 특화된 에이전트"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "wiki-qa"
      system_prompt_id: "wiki_researcher"
      temperature: 0.7
      max_completion_tokens: 4096
      max_iterations: 30
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "wiki_search"
        - "wiki_read_page"
        - "wiki_read_source_doc"
        - "wiki_flag_issue"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-wiki-fixer"
    avatar: "🔧"
    is_builtin: true
    i18n:
      default:
        name: "Wiki Fixer"
        description: "Specialized agent for revising Wiki pages based on inspection issues"
      vi-VN:
        name: "Sửa Wiki"
        description: "Trợ lý AI chuyên dùng để sửa các trang Wiki dựa trên vấn đề rà soát"
      ja-JP:
        name: "Wiki 修訂"
        description: "検査の問題に基づいてWikiページを修復および最適化するための専用エージェント"
      ko-KR:
        name: "위키 수정"
        description: "검사 문제를 기반으로 Wiki 페이지를 修復하고 最適化하는 전용 에이전트"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "custom"
      system_prompt_id: "wiki_fixer"
      temperature: 0.7
      max_completion_tokens: 4096
      max_iterations: 30
      kb_selection_mode: "selected"
      retrieve_kb_only_when_mentioned: false
      retain_retrieval_history: true
      allowed_tools:
        - "wiki_search"
        - "wiki_read_page"
        - "wiki_read_source_doc"
        - "wiki_write_page"
        - "wiki_replace_text"
        - "wiki_rename_page"
        - "wiki_delete_page"
        - "wiki_read_issue"
        - "wiki_update_issue"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-chess-coach"
    avatar: "♟️"
    is_builtin: true
    i18n:
      default:
        name: "Chess Coach"
        description: "Chess teaching and analysis assistant: position evaluation, best moves, game review, opening lookup, with an interactive board"
      vi-VN:
        name: "HLV Cờ vua"
        description: "Trợ lý dạy và phân tích cờ vua: đánh giá thế cờ, gợi ý nước đi, chấm ván, tra khai cuộc, kèm bàn cờ tương tác"
      ja-JP:
        name: "チェスコーチ"
        description: "チェスの指導と分析アシスタント：局面評価、最善手、棋譜レビュー、定跡検索、インタラクティブな盤面付き"
      ko-KR:
        name: "체스 코치"
        description: "체스 교육 및 분석 도우미: 형세 평가, 최선수, 기보 리뷰, 오프닝 조회, 인터랙티브 보드 제공"
    config:
      agent_mode: "smart-reasoning"
      agent_type: "custom"
      system_prompt: |
        Bạn là một huấn luyện viên cờ vua thân thiện, kiên nhẫn, giảng giải bằng tiếng Việt cho học viên ở nhiều trình độ.

        Nguyên tắc phân tích cờ (ƯU TIÊN CAO — thực hiện trước):
        - Khi người dùng đưa một thế cờ (FEN) và hỏi đánh giá hoặc nên đi nước nào, hãy dùng công cụ chess_analyze_position hoặc chess_best_move thay vì tự suy đoán.
        - Khi người dùng dán một ván cờ (PGN) và muốn biết sai ở đâu, hãy dùng chess_evaluate_game ngay với PGN đó.
        - Khi context chứa nội dung ván cờ (PGN) từ liên kết [[game/...]], hãy dùng chess_evaluate_game TRỰC TIẾP với PGN đó — không cần tìm PGN trong kho tri thức.
        - Khi người dùng hỏi một nước cụ thể tốt hay xấu, hãy dùng chess_explain_move.
        - Khi người dùng hỏi tên khai cuộc, hãy dùng chess_lookup_opening.

        Nguyên tắc kho tri thức (dùng bổ sung, không thay thế công cụ cờ):
        - Dùng knowledge_search để trích dẫn lý thuyết, sách, ván mẫu từ kho tri thức — nhưng chỉ SAU KHI đã dùng công cụ cờ phân tích xong, hoặc khi câu hỏi thuần lý thuyết.
        - Nếu knowledge_search không tìm được nội dung phù hợp, hãy tiếp tục trả lời bằng kiến thức cờ vua của bạn và các công cụ cờ có sẵn — đừng bỏ cuộc.

        Quy tắc chung:
        - Luôn dùng ký hiệu nước đi tiêu chuẩn (SAN), ví dụ Nf3, e4, O-O.
        - Giải thích ngắn gọn, dễ hiểu, hướng tới việc dạy: nêu ý tưởng, kế hoạch, cạm bẫy chiến thuật.
        - Các công cụ cờ đã tự trả về bàn cờ tương tác; bạn chỉ cần diễn giải kết quả bằng lời.
        - Khi muốn minh họa một thế cờ trong câu trả lời mà không gọi công cụ, hãy chèn một khối mã ```chess chứa chuỗi FEN hoặc PGN để hệ thống tự hiển thị bàn cờ.
      temperature: 0.6
      max_completion_tokens: 4096
      max_iterations: 30
      # RAG cờ bật (CHESS_KB_INDEX=true): nạp KB "Tri thức cờ vua" qua knowledge_search.
      # Rollback: đổi kb_selection_mode: "none" + xóa knowledge_search/grep_chunks → restart app.
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "thinking"
        - "knowledge_search"
        - "grep_chunks"
        - "chess_analyze_position"
        - "chess_best_move"
        - "chess_evaluate_game"
        - "chess_explain_move"
        - "chess_lookup_opening"
        - "chess_generate_puzzle"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 10
      keyword_threshold: 0.2
      vector_threshold: 0.3
      rerank_top_k: 10
      rerank_threshold: 0.1

